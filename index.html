<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz Ear Trainer</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js" defer></script>
</head>

<body>
    <header>
        <h1>Jazz Standard Ear Trainer</h1>
        <div id="setup-panel" class="panel">
            <label for="tempo">BPM:</label>
            <input type="number" id="tempo" min="40" max="300" value="120">
            <label style="display:flex; align-items:center; gap:0.25rem; margin-right: 0.5rem; cursor:pointer;">
                <input type="checkbox" id="click-track"> Click
            </label>
            <select id="display-mode" class="display-mode-select">
                <option value="both">Staff & Tabs</option>
                <option value="staff">Staff Only</option>
                <option value="tabs">Tabs Only</option>
            </select>
            <button id="manage-tunes-btn" class="btn secondary">Select Tunes</button>
            <button id="export-btn" class="btn secondary">Export Data</button>
            <button id="import-btn" class="btn secondary">Import Data</button>
            <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
    </header>

    <main>
        <div class="left-column">
            <section id="status-card" class="card">
                <span id="tune-title-link">
                    <div id="youtube-link-container" class="hidden">
                        <a id="youtube-link" href="#" target="_blank" title="Listen on YouTube">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z" />
                            </svg>
                        </a>
                    </div>
                    <h2 id="tune-title">Loading Tune...</h2>
                </span>
                <div class="key-container">
                    <button id="key-reset-btn" class="btn secondary" style="padding: 0.2rem 0.5rem; margin: 0; font-size: 1rem; line-height: 1; border-radius: 4px;" title="Reset to Original Key">↻</button>
                    <div id="tune-key" class="badge">Key: --</div>
                    <div class="key-buttons">
                        <button id="key-up-btn" class="key-btn btn secondary" title="Transpose Up">▲</button>
                        <button id="key-down-btn" class="key-btn btn secondary" title="Transpose Down">▼</button>
                    </div>
                </div>
            </section>

            <section class="card notation-container">
                <notation-viewer id="notation-display"></notation-viewer>
            </section>
        </div>

        <div class="right-column">
            <section id="controls-card" class="card grid-controls">
                <div class="control-group">
                    <button id="play-both-btn" class="btn primary">Play Both</button>
                    <button id="play-melody-btn" class="btn primary">Play Melody</button>
                    <button style="display: none;" id="toggle-chords-btn" class="btn secondary">Loop Chords:
                        OFF</button>
                </div>
                <div class="control-group">
                    <button id="reveal-first-btn" class="btn hint">Reveal First Note</button>
                    <button id="reveal-melody-btn" class="btn hint">Reveal Full Melody</button>
                    <button id="reveal-chords-btn" class="btn hint">Reveal Full Chords</button>
                </div>
            </section>

            <section id="evaluation-card" class="card hidden">
                <div class="confidence-buttons">
                    <button class="btn conf-btn" data-level="1">1 - Lost</button>
                    <button class="btn conf-btn" data-level="2">2 - Hesitant</button>
                    <button class="btn conf-btn" data-level="3">3 - Comfortable</button>
                    <button class="btn conf-btn" data-level="4">4 - Mastered</button>
                </div>
                <button id="next-tune-btn" class="btn action hidden">Next Tune →</button>
            </section>
        </div>
    </main>

    <div id="tune-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Select Tunes to Include</h3>
            <div id="tune-checkbox-list"></div>
            <button id="close-modal-btn" class="btn primary">Save & Close</button>
        </div>
    </div>
</body>

</html>
